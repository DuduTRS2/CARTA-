<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Especial 💌</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 300px;
      height: 200px;
      cursor: pointer;
    }

    .envelope {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff6f91;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      transition: transform 0.6s ease;
    }

    .envelope::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ff4e7a;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .letter {
      position: absolute;
      width: 90%;
      height: 90%;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.6s ease;
      z-index: 1;
    }

    .container.open .letter {
      transform: translateY(-120%);
    }

    .container.open .envelope {
      transform: rotateX(180deg);
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>

<div class="container" onclick="openLetter()">
  <div class="envelope"></div>
  <div class="letter">
    <h2>💖 Para você</h2>
    <p>
      oie como vai?
    </p>
  </div>
</div>

<script>
  function openLetter() {
    document.querySelector('.container').classList.toggle('open');
  }
</script>

</body>
</html>
