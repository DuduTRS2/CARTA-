<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Mágica Suprema 💌✨</title><style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1a0026, #000);
  font-family: Arial;
  overflow:hidden;
  color:white;
}

.container {
  position:relative;
  width:320px;
  height:220px;
  cursor:pointer;
}

/* ENVELOPE */
.envelope {
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4e7a;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  z-index:2;
}

.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:#ff2e63;
  clip-path: polygon(0 0, 50% 55%, 100% 0);
  transform-origin: top;
  transition: 0.8s;
  z-index:3;
}

/* CARTA */
.letter {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(0);
  width:90%;
  height:90%;
  background:white;
  color:black;
  border-radius:12px;
  padding:20px;
  box-sizing:border-box;
  text-align:center;
  opacity:0;
  z-index:1;
}

/* ANIMAÇÃO DE PULO */
@keyframes jumpOut {
  0% {
    transform: translate(-50%, -50%) scale(0);
    opacity:0;
  }
  50% {
    transform: translate(-50%, -180%) scale(1.1);
    opacity:1;
  }
  70% {
    transform: translate(-50%, -140%) scale(0.95);
  }
  100% {
    transform: translate(-50%, -150%) scale(1);
    opacity:1;
  }
}

.container.open .letter {
  animation: jumpOut 0.9s ease forwards;
  z-index: 10; /* GARANTE que fique na frente */
}

/* IMPORTANTE: quando abrir, o envelope vai pra trás */
.container.open .envelope {
  z-index: 1;
}

.container.open .flap {
  z-index: 2;
}

/* TEXTO ANIMADO */
.typing {
  border-right:2px solid black;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 3s steps(40, end) forwards, blink 0.5s infinite;
}

@keyframes typing {
  to { width:100%; }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* PARTÍCULAS */
.sparkle {
  position:absolute;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  animation: sparkle 1s linear forwards;
}

@keyframes sparkle {
  0% {opacity:1; transform:scale(1);}
  100% {opacity:0; transform:translate(var(--x), var(--y)) scale(0);}
}

/* CORAÇÕES */
.heart {
  position:absolute;
  color:#ff4e7a;
  font-size:18px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  0% {transform:translateY(0); opacity:1;}
  100% {transform:translateY(-150px); opacity:0;}
}

/* ABRIR ENVELOPE */
.container.open .flap {
  transform: rotateX(180deg);
}

/* FUNDO ESTRELADO */
.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity:0.2}
  to {opacity:1}
}

</style></head>
<body><div class="container" onclick="openLetter()">
  <div class="envelope">
    <div class="flap"></div>
  </div>  <div class="letter">
    <h2>💖 Para você</h2>
    <p class="typing">Agora a carta pula pra fora do envelope só pra você 😏✨</p>
  </div>
</div><script>

function openLetter(){
  const c = document.querySelector('.container');
  c.classList.toggle('open');
  createSparkles();
  createHearts();
}

function createSparkles(){
  for(let i=0;i<25;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    s.style.left='50%';
    s.style.top='50%';
    s.style.setProperty('--x', (Math.random()-0.5)*200+'px');
    s.style.setProperty('--y', (Math.random()-0.5)*200+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function createHearts(){
  for(let i=0;i<10;i++){
    const h = document.createElement('div');
    h.className='heart';
    h.innerHTML='💖';
    h.style.left=(Math.random()*100)+'%';
    h.style.top='60%';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

for(let i=0;i<80;i++){
  const star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  document.body.appendChild(star);
}

</script></body>
</html>
