<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Especial 💌</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }.container {
  position: relative;
  width: 320px;
  height: 220px;
  perspective: 1000px;
  cursor: pointer;
}

.envelope {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: #ff6f91;
  border-radius: 10px;
  overflow: hidden;
  z-index: 2;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: #ff4e7a;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: transform 0.8s ease;
  z-index: 3;
}

.letter {
  position: absolute;
  bottom: 10px; /* começa dentro do envelope */
  left: 50%;
  transform: translateX(-50%) translateY(60%);
  width: 90%;
  height: 90%;
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-sizing: border-box;
  text-align: center;
  transition: transform 1s ease;
  z-index: 1;
}

/* ABRINDO */
.container.open .flap {
  transform: rotateX(180deg);
}

.container.open .letter {
  transform: translateX(-50%) translateY(-80%); /* sobe de dentro */
}

h2 {
  margin-top: 0;
}

  </style>
</head>
<body><div class="container" onclick="openLetter()">
  <div class="envelope">
    <div class="flap"></div>
  </div>  <div class="letter">
    <h2>💖 Para você</h2>
    <p>
      Escreva aqui sua mensagem...
      Agora a carta sai de dentro do envelope de verdade 😏
    </p>
  </div>
</div><script>
  function openLetter() {
    document.querySelector('.container').classList.toggle('open');
  }
</script></body>
</html>
