<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Mágica 💌✨</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }.container {
  position: relative;
  width: 320px;
  height: 220px;
  cursor: pointer;
}

.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6f91;
  border-radius: 10px;
  z-index: 2;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: #ff4e7a;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: transform 0.8s ease;
  z-index: 3;
}

.letter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 90%;
  height: 90%;
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-sizing: border-box;
  text-align: center;
  opacity: 0;
  transition: all 0.6s ease;
  z-index: 1;
}

/* PARTÍCULAS */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 1s linear forwards;
}

@keyframes sparkle {
  0% {
    transform: translate(0,0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(0);
    opacity: 0;
  }
}

/* ABRIR */
.container.open .flap {
  transform: rotateX(180deg);
}

.container.open .letter {
  opacity: 1;
  transform: translate(-50%, -120%) scale(1);
}

h2 {
  margin-top: 0;
}

  </style>
</head>
<body><div class="container" onclick="openLetter()">
  <div class="envelope">
    <div class="flap"></div>
  </div>  <div class="letter">
    <h2>💖 Para você</h2>
    <p>
      Uma carta mágica apareceu só pra você ✨😏
    </p>
  </div>
</div><script>
  function openLetter() {
    const container = document.querySelector('.container');
    container.classList.toggle('open');

    // CRIAR PARTÍCULAS
    for (let i = 0; i < 20; i++) {
      const sparkle = document.createElement('div');
      sparkle.classList.add('sparkle');

      const x = (Math.random() - 0.5) * 200 + 'px';
      const y = (Math.random() - 0.5) * 200 + 'px';

      sparkle.style.setProperty('--x', x);
      sparkle.style.setProperty('--y', y);

      sparkle.style.left = '50%';
      sparkle.style.top = '50%';

      document.body.appendChild(sparkle);

      setTimeout(() => sparkle.remove(), 1000);
    }
  }
</script></body>
</html>
